version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ultra_shop_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ultra_vpn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # PostgreSQL port is kept internal to Docker for security

  redis:
    image: redis:7-alpine
    container_name: ultra_shop_redis
    restart: always
    volumes:
      - redis_data:/data

  bot:
    build: .
    container_name: ultra_shop_bot
    restart: always
    depends_on:
      - redis
      - db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: sh -c "alembic upgrade head && python -m app.bot.main"

  web:
    build: .
    container_name: ultra_shop_web
    restart: always
    depends_on:
      - redis
      - db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: uvicorn app.web.server:app --host 0.0.0.0 --port 8000

volumes:
  redis_data:
  postgres_data:
